name: Release

# Publishes @moku-labs/room to npm when a version tag (v*) is pushed. Re-runs the full gate, then lets
# `npm publish` build + validate via the package's `prepublishOnly` script. Requires the `NPM_TOKEN`
# repository secret (an npm automation token). Provenance is attested via OIDC (`id-token: write`).
#
# Release flow: bump `version` in package.json → commit → `git tag vX.Y.Z` → `git push --tags`.
on:
  push:
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Node (npm registry auth for publish)
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (tsc · lint · coverage gate)
        run: |
          bunx tsc --noEmit
          bun run lint
          bun run test:coverage

      - name: Publish to npm (prepublishOnly runs build + validate)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
