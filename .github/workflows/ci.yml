name: CI

# PR validation for @moku-labs/room. Mirrors the local pre-commit gate (tsc → lint → coverage → build →
# package validation) so a green PR means the same checks that pass locally pass in CI, plus a separate
# job that exercises the runnable sandbox in a real (headless) browser via the deterministic Playwright
# smoke spec. The networked real-WebRTC interop spec stays opt-in (ROOM_E2E_LIVE) and is never run here.
on:
  push:
    branches: [main, "build/**"]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Type-check · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check (tsc --noEmit)
        run: bunx tsc --noEmit

      - name: Lint (Biome + ESLint)
        run: bun run lint

      - name: Unit + integration tests with coverage gate (>=90%)
        run: bun run test:coverage

      - name: Build (tsdown — ESM + CJS, .d.ts)
        run: bun run build

      - name: Validate published package (publint + are-the-types-wrong)
        run: bun run validate

  e2e:
    name: Sandbox e2e smoke (headless Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Sandbox smoke (deterministic, offline ?signaling=memory)
        run: bunx playwright test --project=chromium tests/e2e/sandbox-smoke.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
